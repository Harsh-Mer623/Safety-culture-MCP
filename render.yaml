services:
  - type: web
    name: safetyculture-mcp
    runtime: python
    buildCommand: pip install -e .
    startCommand: fastmcp run src/safetyculture_mcp/server.py:mcp --transport streamable-http --host 0.0.0.0 --port $PORT
    envVars:
      - key: SAFETYCULTURE_API_TOKEN
        sync: false   # set manually in Render dashboard — not stored in repo
